services:
  - type: web
    name: foodscore-api
    runtime: python
    buildCommand: pip install -r backend/requirements-production.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: backend
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"
