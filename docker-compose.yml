
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: foodscore_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-foodscore}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-foodscore_dev_password}
      POSTGRES_DB: ${DB_NAME:-foodscore}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-foodscore}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: 
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - foodscore_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodscore_backend
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://${DB_USER:-foodscore}:${DB_PASSWORD:-foodscore_dev_password}@postgres:5432/${DB_NAME:-foodscore}
      PYTHONUNBUFFERED: 1
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - foodscore_network

networks:
  foodscore_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
