
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: foodscore_db
    environment:
      POSTGRES_USER: foodscore
      POSTGRES_PASSWORD: foodscore_dev_password
      POSTGRES_DB: foodscore
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U foodscore" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - foodscore_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodscore_backend
    environment:
      DATABASE_URL: postgresql://foodscore:foodscore_dev_password@postgres:5432/foodscore
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - foodscore_network

networks:
  foodscore_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
